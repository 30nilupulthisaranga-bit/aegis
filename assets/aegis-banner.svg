<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="270" viewBox="0 0 1080 270" role="img" aria-label="Aegis banner">
  <title>Aegis Banner</title>
  <defs>
    <linearGradient id="wordmarkGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB36B"/>
      <stop offset="55%" stop-color="#F2994A"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFC98F"/>
      <stop offset="100%" stop-color="#E78661"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <g transform="translate(80,42)">
    <polygon points="0,74 70,0 170,0 100,74 170,148 70,148" fill="url(#accentGradient)" opacity="0.95"/>
    <polygon points="34,74 86,20 136,20 84,74 136,128 86,128" fill="none" stroke="#FFF1DE" stroke-width="6" opacity="0.85"/>
  </g>

  <g transform="translate(250,0)">
    <text
      x="0"
      y="138"
      fill="url(#wordmarkGradient)"
      font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
      font-size="122"
      font-weight="900"
      letter-spacing="10"
      filter="url(#softGlow)"
    >
      AEGIS
    </text>
    <text
      x="2"
      y="200"
      fill="#E6A078"
      font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
      font-size="27"
      font-weight="700"
      letter-spacing="6"
      opacity="0.95"
    >
      CREDENTIAL PROXY FOR AI AGENTS
    </text>
    <line x1="2" y1="218" x2="760" y2="218" stroke="url(#wordmarkGradient)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
